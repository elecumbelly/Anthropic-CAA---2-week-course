  const c = COURSES[courseKey]; if (!c) return null;
  const accent = c.domain.map(d=>DOMAINS.find(dm=>dm.id===d)?.color).filter(Boolean)[0]||"#64748b";
  return <a href={c.url} target="_blank" rel="noopener noreferrer" className="course-chip" style={{background:accent+"12",border:"1px solid "+accent+"30"}}>
    <span style={{fontSize:10}}>📚</span><span className="course-chip-name" style={{color:accent}}>{c.name}</span><span className="course-chip-dur">{c.duration}</span><span className="course-chip-arrow" style={{color:accent}}>↗</span>
  </a>;
}
function ResourceChip({resKey}) {
  const r = RESOURCES[resKey]; if (!r) return null;
  return <a href={r.url} target="_blank" rel="noopener noreferrer" className="res-chip">
    <span style={{fontSize:10}}>{resIcons[r.type]}</span><span className="res-chip-name">{r.name}</span><span className="res-chip-arrow">↗</span>
  </a>;
}

function DayCard({day,isSelected,onClick}) {
  const tc = typeConfig[day.type];
  const total = day.hours.courses+day.hours.build+day.hours.review;
  const segs = [{v:day.hours.courses,c:"#3B82F6"},{v:day.hours.build,c:"#10B981"},{v:day.hours.review,c:"#8B5CF6"}].filter(s=>s.v>0);
  return <div className="day-card-wrap">
    <button className={"day-card "+(isSelected?"selected":"")} onClick={onClick} style={{background:isSelected?tc.bg:undefined, borderColor:isSelected?tc.border:undefined, boxShadow:isSelected?"0 0 20px "+tc.border+"12":"none"}}>
      <div className="day-card-head">
        <span className="day-card-day" style={{color:tc.border}}>{day.day===14?"🎯 ":""}DAY {day.day}</span>
        <span className="day-card-type" style={{color:tc.border,background:tc.border+"18"}}>{tc.label}</span>
      </div>
      <div className="day-card-title">{day.title}</div>
      {day.domains.length>0 && <div className="day-card-domains">{day.domains.map(dId=>{const dm=DOMAINS.find(d=>d.id===dId);return <div key={dId} className="domain-badge" style={{background:dm.color}}>{dId}</div>})}</div>}
      {total>0 && <div className="hours-bar"><div className="hours-bar-track">{segs.map((s,i)=><div key={i} className="hours-bar-seg" style={{flex:s.v,background:s.c}}/>)}</div><span className="hours-bar-label">{total}h</span></div>}
      <div className="day-card-tap" style={{borderTop:"1px solid "+(isSelected?tc.border+"30":"rgba(255,255,255,0.05)"),color:isSelected?tc.border:"#475569"}}>{isSelected?"▾ VIEWING":"▸ TAP FOR DETAIL"}</div>
    </button>
    {isSelected && <div className="arrow-down" style={{borderTopColor:tc.border+"40"}}/>}
  </div>;
}

function DayDetail({day}) {
  const tc = typeConfig[day.type];
  const [showDeep,setShowDeep] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{setShowDeep(false);ref.current?.scrollIntoView({behavior:"smooth",block:"nearest"})},[day.day]);
  return <div ref={ref} className="day-detail" style={{background:"linear-gradient(135deg,"+tc.border+"08,rgba(255,255,255,0.03))",border:"1px solid "+tc.border+"25",boxShadow:"0 0 20px "+tc.border+"12"}}>
    <div className="day-detail-head">
      <div><div className="day-detail-meta" style={{color:tc.border}}>DAY {day.day} — WEEK {day.week}</div><div className="day-detail-title">{day.title}</div></div>
      <div className="day-detail-type-badge" style={{color:tc.border,background:tc.border+"15"}}>{tc.label}</div>
    </div>
    {day.domains.length>0 && <div className="day-detail-domains">{day.domains.map(dId=>{const dm=DOMAINS.find(d=>d.id===dId);return <div key={dId} className="domain-chip" style={{background:dm.color+"12",border:"1px solid "+dm.color+"25"}}><div className="domain-chip-badge" style={{background:dm.color}}>{dId}</div><span className="domain-chip-label" style={{color:dm.color}}>{dm.name} ({dm.weight}%)</span></div>})}</div>}
    {day.slots.map((slot,i)=><div key={i} className="slot" style={{borderLeft:"3px solid "+tc.border+"35"}}>
      <div className="slot-head"><span className="slot-icon">{slot.icon}</span><span className="slot-label">{slot.label.toUpperCase()}</span></div>
      <div className="slot-text">{slot.text}</div>
      {(slot.courses?.length>0||slot.resources?.length>0) && <div className="slot-chips">{(slot.courses||[]).map((ck,j)=><CourseChip key={j} courseKey={ck}/>)}{(slot.resources||[]).map((rk,j)=><ResourceChip key={j} resKey={rk}/>)}</div>}
    </div>)}
    {day.keyTerms.length>0 && <div className="key-terms"><div className="key-terms-label">EXAM-CRITICAL CONCEPTS</div><div className="key-terms-list">{day.keyTerms.map((t,i)=><span key={i} className="key-term">{t}</span>)}</div></div>}
    <div className="milestone" style={{background:tc.border+"08",border:"1px solid "+tc.border+"18"}}>
      <span style={{fontSize:12}}>🏁</span><div><div className="milestone-label" style={{color:tc.border}}>END-OF-DAY MILESTONE</div><div className="milestone-text">{day.milestone}</div></div>
    </div>
    {day.deepDive && <><button className={"deep-dive-btn "+(showDeep?"open":"")} onClick={()=>setShowDeep(!showDeep)}>
      <span className="deep-dive-label">{showDeep?"▾":"▸"} DEEP DIVE — WHY THIS MATTERS FOR THE EXAM</span><span className="deep-dive-hint">{showDeep?"collapse":"expand"}</span>
    </button>{showDeep && <div className="deep-dive-content">{day.deepDive}</div>}</>}
  </div>;
}

function WeekSection({week,label,color,selectedDay,setSelectedDay,offset}) {
  const days = DAYS.filter(d=>d.week===week);
  const sel = selectedDay>=offset && selectedDay<offset+days.length;
  const tot=days.reduce((s,d)=>s+d.hours.courses+d.hours.build+d.hours.review,0);
  const ch=days.reduce((s,d)=>s+d.hours.courses,0), bh=days.reduce((s,d)=>s+d.hours.build,0), rh=days.reduce((s,d)=>s+d.hours.review,0);
  return <div style={{marginBottom:sel?0:18}}>
    <div className="week-label" style={{color}}>{label}</div>
    <div className="week-summary">
      <div><div className="week-summary-total-label">TOTAL</div><div className="week-summary-total">{tot}h</div></div>
      <div className="week-summary-divider"/>
      {[{l:"COURSES",v:ch,c:"#3B82F6"},{l:"BUILDING",v:bh,c:"#10B981"},{l:"REVIEW",v:rh,c:"#8B5CF6"}].map(s=><div key={s.l}><div className="week-summary-cat-label" style={{color:s.c}}>{s.l}</div><div className="week-summary-cat-val">{s.v}h</div></div>)}
    </div>
    <div className="day-grid">{days.map((d,i)=><DayCard key={i} day={d} isSelected={selectedDay===offset+i} onClick={()=>setSelectedDay(offset+i)}/>)}</div>
    {sel && <DayDetail day={DAYS[selectedDay]}/>}
  </div>;
}
function App() {
  const [selectedDay,setSelectedDay] = useState(0);
  const totalHours = DAYS.reduce((s,d)=>s+d.hours.courses+d.hours.build+d.hours.review,0);
  const quickLinks = [
    {label:"Anthropic Academy",url:"https://anthropic.skilljar.com/",icon:"🎓"},
    {label:"Partner Network",url:"https://anthropic.com/news/claude-partner-network",icon:"🤝"},
    {label:"Exam Registration",url:"https://anthropic.skilljar.com/claude-certified-architect-foundations-access-request",icon:"📋"},
    {label:"API Docs",url:"https://docs.anthropic.com",icon:"📖"},
    {label:"MCP Docs",url:"https://modelcontextprotocol.io",icon:"🔌"},
    {label:"Practice Questions",url:"https://claudecertifications.com",icon:"📝"},
  ];
  return <div className="container">
    <div style={{marginBottom:18}}>
      <div className="header-tag">CCA FOUNDATIONS — 2 WEEK INTENSIVE</div>
      <div className="header-title">Your Certification Sprint</div>
      <div className="header-sub">{totalHours} hours · 14 days · Tap day cards for breakdown · Click course links to open</div>
    </div>
    <div className="quick-links">
      <div className="quick-links-label">QUICK LINKS — ALL FREE</div>
      <div className="quick-links-grid">{quickLinks.map((l,i)=><a key={i} href={l.url} target="_blank" rel="noopener noreferrer" className="ql-chip"><span>{l.icon}</span><span>{l.label}</span><span className="arrow">↗</span></a>)}</div>
    </div>
    <div style={{marginBottom:18}}>
      <div className="section-label">EXAM DOMAIN WEIGHTS</div>
      <div className="domain-bar">{DOMAINS.map(d=><div key={d.id} className="domain-bar-seg" style={{flex:d.weight,background:d.color}}>{d.weight}%</div>)}</div>
      <div className="domain-legend">{DOMAINS.map(d=><div key={d.id} className="domain-legend-item"><div className="domain-dot" style={{background:d.color}}/><span style={{color:"#94a3b8",fontWeight:600}}>D{d.id}</span><span style={{color:"#cbd5e1"}}>{d.name}</span></div>)}</div>
    </div>
    <WeekSection week={1} label="WEEK 1 — LEARN THE ARCHITECTURE" color="#3B82F6" selectedDay={selectedDay} setSelectedDay={setSelectedDay} offset={0}/>
    <WeekSection week={2} label="WEEK 2 — BUILD, TEST, HARDEN" color="#10B981" selectedDay={selectedDay} setSelectedDay={setSelectedDay} offset={7}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
